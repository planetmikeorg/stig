---
# Shared variables for RHEL-08-010149 and RHEL-08-010150
#
# vault_grub2_password_hash must be defined in an Ansible Vault-encrypted file
# (e.g. vault.yml) and passed at runtime:
#   ansible-playbook -e @vault.yml --ask-vault-pass <playbook>

# grub.pbkdf2.sha512 hash — generate with:  grub2-mkpasswd-pbkdf2
grub2_password_hash: "{{ vault_grub2_password_hash }}"

# Enable per-host password generation and 1Password storage for
# RHEL-08-010149 and RHEL-08-010150.
# Requires the `onepassword.connect` Ansible collection and a 1Password
# Connect deployment.
grub2_manage_password_in_1password: true

# 1Password Connect configuration
grub2_1password_connect_host: ""
grub2_1password_connect_token: "{{ vault_grub2_1password_connect_token | default('') }}"
grub2_1password_vault_id: ""
grub2_1password_username: "grub2-superuser"
grub2_1password_notes: "Autogenerated GRUB2 password"

# Generated password settings
grub2_password_length: 24
grub2_password_charset:
  - ascii_letters
  - digits
  - punctuation

# GRUB2 superusers account name
grub2_superusers: "superuser"

# File paths
grub2_user_cfg: /boot/grub2/user.cfg
grub2_users_script: /etc/grub.d/01_users
grub2_cfg: /boot/grub2/grub.cfg
