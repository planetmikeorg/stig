---
# STIG ID:   RHEL-08-010150
# Vuln ID:   V-230235
# Rule Title: RHEL 8 operating systems booted with a BIOS must require
#             authentication upon booting into single-user and maintenance modes.
# Severity:  High (CAT I)
# CCI:       CCI-000213
# Check:     sudo grep -iw grub2_password /boot/grub2/user.cfg
#            Result must begin with "grub.pbkdf2.sha512"
# Fix:       Write a PBKDF2 password hash to /boot/grub2/user.cfg
# Note:      NOT APPLICABLE on UEFI systems.

- name: STIG RHEL-08-010150 - Require GRUB2 bootloader password (BIOS systems)
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - vars.yml

  pre_tasks:
    - name: Skip play on UEFI systems (Not Applicable)
      ansible.builtin.meta: end_host
      when: ansible_facts['firmware_type'] | default('') == 'efi'

    - name: Generate strong GRUB2 password per host
      ansible.builtin.set_fact:
        grub2_generated_password: >-
          {{ lookup('ansible.builtin.password', '/dev/null',
          length=grub2_password_length, chars=grub2_password_charset) }}
      when: grub2_manage_password_in_1password | bool
      no_log: true

    - name: Build PBKDF2 hash from generated password
      ansible.builtin.shell: |
        set -o pipefail
        grub2-mkpasswd-pbkdf2 << 'EOF' | awk '/grub.pbkdf2/{print $7}'
        {{ grub2_generated_password }}
        {{ grub2_generated_password }}
        EOF
      args:
        executable: /bin/bash
      register: grub2_generated_password_hash_cmd
      changed_when: false
      when: grub2_manage_password_in_1password | bool
      no_log: true

    - name: Set active GRUB2 password hash
      ansible.builtin.set_fact:
        grub2_password_hash_active: >-
          {{
            (grub2_generated_password_hash_cmd.stdout | trim)
            if (grub2_manage_password_in_1password | bool)
            else grub2_password_hash
          }}
      no_log: true

    - name: Validate 1Password vault variable when enabled
      ansible.builtin.assert:
        that:
          - grub2_1password_connect_host | string | length > 0
          - grub2_1password_connect_token | string | length > 0
          - grub2_1password_vault_id | string | length > 0
        fail_msg: >-
          Set grub2_1password_connect_host, grub2_1password_connect_token,
          and grub2_1password_vault_id when grub2_manage_password_in_1password=true.
      when: grub2_manage_password_in_1password | bool

    - name: Insert GRUB2 credential in 1Password per host
      onepassword.connect.generic_item:
        hostname: "{{ grub2_1password_connect_host }}"
        token: "{{ grub2_1password_connect_token }}"
        vault_id: "{{ grub2_1password_vault_id }}"
        title: "{{ inventory_hostname }}"
        state: present
        fields:
          - label: username
            value: "{{ grub2_1password_username }}"
          - label: password
            value: "{{ grub2_generated_password }}"
            field_type: concealed
          - label: notes
            value: "RHEL-08-010150 autogenerated GRUB2 password"
      delegate_to: localhost
      become: false
      when: grub2_manage_password_in_1password | bool
      no_log: true

  tasks:
    - name: Write GRUB2 password hash to /boot/grub2/user.cfg
      ansible.builtin.copy:
        dest: "{{ grub2_user_cfg }}"
        content: "GRUB2_PASSWORD={{ grub2_password_hash_active }}\n"
        owner: root
        group: root
        mode: '0600'
        backup: true

    - name: Verify password hash begins with grub.pbkdf2.sha512
      ansible.builtin.command:
        cmd: grep -iw grub2_password "{{ grub2_user_cfg }}"
      register: grub2_password_check
      changed_when: false
      failed_when: >
        grub2_password_check.rc != 0 or
        'grub.pbkdf2.sha512' not in grub2_password_check.stdout
