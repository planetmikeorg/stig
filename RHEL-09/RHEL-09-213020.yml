---
# STIG ID:   RHEL-09-213020
# Vuln ID:   V-257799
# Rule Title: RHEL 9 must prevent the loading of a new kernel for later execution.
# Severity:  Medium (CAT II)
# CCI:       CCI-003992, CCI-001749
# Check:     sysctl kernel.kexec_load_disabled -> 1
# Fix:       Deploy /etc/sysctl.d/99-kernel_kexec_load_disabled.conf with
#            kernel.kexec_load_disabled = 1 and reload sysctl settings.

- name: STIG RHEL-09-213020 - Disable kexec kernel loading
  hosts: all
  become: true
  gather_facts: false

  vars:
    sysctl_dropin_src: files/RHEL-09-213020/99-kernel_kexec_load_disabled.conf
    sysctl_dropin_dest: /etc/sysctl.d/99-kernel_kexec_load_disabled.conf

  tasks:
    - name: Deploy managed sysctl drop-in from playbook folder
      ansible.builtin.copy:
        src: "{{ sysctl_dropin_src }}"
        dest: "{{ sysctl_dropin_dest }}"
        owner: root
        group: root
        mode: '0644'
        backup: true

    - name: Reload sysctl settings from all config files
      ansible.builtin.command:
        cmd: sysctl --system
      changed_when: true

    - name: Verify kernel.kexec_load_disabled is set to 1
      ansible.builtin.command:
        cmd: sysctl -n kernel.kexec_load_disabled
      register: kexec_verify
      changed_when: false
      failed_when: kexec_verify.stdout | trim != '1'
